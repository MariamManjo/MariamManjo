  <rect x="574" y="14" width="2" height="14" fill="#6366f1" opacity="0.9"/>
  <rect x="808" y="14" width="12" height="2" fill="#6366f1" opacity="0.9"/>
  <rect x="818" y="14" width="2" height="14" fill="#6366f1" opacity="0.9"/>
