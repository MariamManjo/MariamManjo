<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" width="820" height="260">

  <!-- Background -->
  <rect width="820" height="260" fill="#0D1117" rx="16"/>

  <!-- Grid overlay -->
  <line x1="0" y1="65" x2="820" y2="65" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="130" x2="820" y2="130" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="195" x2="820" y2="195" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="205" y1="0" x2="205" y2="260" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="410" y1="0" x2="410" y2="260" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="615" y1="0" x2="615" y2="260" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- ═══════════════ CARD 1 — PINK ═══════════════ -->

  <!-- Outer glow -->
  <rect x="8" y="8" width="258" height="244" rx="12" fill="none" stroke="#ff6b9d" stroke-width="6" opacity="0.08">
    <animate attributeName="opacity" values="0.04;0.14;0.04" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Card body -->
  <rect x="14" y="14" width="246" height="232" rx="10" fill="#0f1219" stroke="#ff6b9d" stroke-width="1.2">
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Top glow bar -->
  <rect x="14" y="14" width="246" height="3" rx="1.5" fill="#ff6b9d">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner TL -->
  <rect x="14" y="14" width="14" height="2" fill="#ff6b9d" opacity="0.9"/>
  <rect x="14" y="14" width="2" height="14" fill="#ff6b9d" opacity="0.9"/>
  <!-- Corner TR -->
  <rect x="248" y="14" width="12" height="2" fill="#ff6b9d" opacity="0.9"/>
  <rect x="258" y="14" width="2" height="14" fill="#ff6b9d" opacity="0.9"/>
  <!-- Corner BL -->
  <rect x="14" y="242" width="14" height="2" fill="#ff6b9d" opacity="0.9"/>
  <rect x="14" y="232" width="2" height="12" fill="#ff6b9d" opacity="0.9"/>
