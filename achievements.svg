  <!-- Name -->
  <text x="137" y="160" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.92">AI Hackathon for</text>
  <text x="137" y="175" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.92">Women &amp; Girls</text>

