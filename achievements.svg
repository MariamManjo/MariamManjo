<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" width="880" height="270">

  <!-- Background -->
  <rect width="880" height="270" fill="#0D1117" rx="24"/>

  <!-- Grid overlay -->
  <line x1="0" y1="67" x2="880" y2="67" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="135" x2="880" y2="135" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="0" y1="202" x2="880" y2="202" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="220" y1="0" x2="220" y2="270" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="440" y1="0" x2="440" y2="270" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
  <line x1="660" y1="0" x2="660" y2="270" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>

  <!-- ═══════ CARD 1 — PINK ═══════ -->

  <!-- Soft outer glow -->
  <rect x="12" y="12" width="286" height="246" rx="26" fill="none" stroke="#ff6b9d" stroke-width="10" opacity="0.05">
    <animate attributeName="opacity"
      values="0.02;0.12;0.02" dur="3s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <!-- Card body -->
  <rect x="20" y="20" width="270" height="230" rx="20" fill="#0f1219" stroke="#ff6b9d" stroke-width="1.4">
    <animate attributeName="stroke-opacity"
      values="0.3;1;0.3" dur="3s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <!-- Top accent bar -->
  <rect x="20" y="20" width="270" height="4" rx="20" fill="#ff6b9d">
    <animate attributeName="opacity"
      values="0.45;1;0.45" dur="3s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>

  <text x="155" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#ff6b9d" letter-spacing="2.5" opacity="0.8">ACHIEVEMENT UNLOCKED</text>
  <line x1="36" y1="51" x2="274" y2="51" stroke="#ff6b9d" stroke-width="0.5" opacity="0.2"/>

  <!-- Floating icon -->
  <g>
    <text x="155" y="118" text-anchor="middle" font-size="48" font-family="serif">🏆</text>
    <!-- gentle float -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-6;0,0" dur="3.2s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite" additive="sum"/>
    <!-- periodic wiggle every 5s -->
    <animateTransform attributeName="transform" type="rotate"
      values="0 155 92;-18 155 92;18 155 92;-10 155 92;10 155 92;-4 155 92;4 155 92;0 155 92"
      keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1"
      dur="0.7s"
      begin="3s;8s;13s;18s;23s;28s"
      additive="sum"/>
  </g>

  <!-- WINNER pill -->
  <rect x="111" y="130" width="88" height="20" rx="10" fill="#ff6b9d" opacity="0.12"/>
  <rect x="111" y="130" width="88" height="20" rx="10" fill="none" stroke="#ff6b9d" stroke-width="0.8" opacity="0.5"/>
  <text x="155" y="144" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ff6b9d" font-weight="bold" letter-spacing="2.5">WINNER</text>

  <text x="155" y="168" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">AI Hackathon for</text>
  <text x="155" y="183" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">Women &amp; Girls</text>

  <!-- XP bar -->
  <rect x="45" y="207" width="220" height="5" rx="2.5" fill="#ffffff" opacity="0.06"/>
  <rect x="45" y="207" width="0" height="5" rx="2.5" fill="#ff6b9d" opacity="0.85">
    <animate attributeName="width" from="0" to="220" dur="1.6s"
      calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"
      fill="freeze" begin="0.4s"/>
  </rect>
  <text x="155" y="232" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ff6b9d" opacity="0.6">◆  +500 XP  ◆</text>

  <!-- ═══════ CARD 2 — PURPLE ═══════ -->

  <rect x="297" y="12" width="286" height="246" rx="26" fill="none" stroke="#a855f7" stroke-width="10" opacity="0.05">
    <animate attributeName="opacity"
      values="0.02;0.12;0.02" dur="3.4s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <rect x="305" y="20" width="270" height="230" rx="20" fill="#0f1219" stroke="#a855f7" stroke-width="1.4">
    <animate attributeName="stroke-opacity"
      values="0.3;1;0.3" dur="3.4s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <rect x="305" y="20" width="270" height="4" rx="20" fill="#a855f7">
    <animate attributeName="opacity"
      values="0.45;1;0.45" dur="3.4s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>

  <text x="440" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#a855f7" letter-spacing="2.5" opacity="0.8">ACHIEVEMENT UNLOCKED</text>
  <line x1="321" y1="51" x2="559" y2="51" stroke="#a855f7" stroke-width="0.5" opacity="0.2"/>

  <g>
    <text x="440" y="118" text-anchor="middle" font-size="48" font-family="serif">🚀</text>
    <!-- gentle float -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-6;0,0" dur="2.8s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite" additive="sum"/>
    <!-- periodic wiggle every 5s, offset 1.5s -->
    <animateTransform attributeName="transform" type="rotate"
      values="0 440 92;-18 440 92;18 440 92;-10 440 92;10 440 92;-4 440 92;4 440 92;0 440 92"
      keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1"
      dur="0.7s"
      begin="4.5s;9.5s;14.5s;19.5s;24.5s;29.5s"
      additive="sum"/>
  </g>

  <rect x="396" y="130" width="88" height="20" rx="10" fill="#a855f7" opacity="0.12"/>
  <rect x="396" y="130" width="88" height="20" rx="10" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <text x="440" y="144" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#a855f7" font-weight="bold" letter-spacing="2.5">WINNER</text>

  <text x="440" y="168" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">UG Startup Factory</text>
  <text x="440" y="183" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">Pre-Acceleration</text>

  <rect x="330" y="207" width="220" height="5" rx="2.5" fill="#ffffff" opacity="0.06"/>
  <rect x="330" y="207" width="0" height="5" rx="2.5" fill="#a855f7" opacity="0.85">
    <animate attributeName="width" from="0" to="220" dur="1.6s"
      calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"
      fill="freeze" begin="0.7s"/>
  </rect>
  <text x="440" y="232" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#a855f7" opacity="0.6">◆  +750 XP  ◆</text>

  <!-- ═══════ CARD 3 — INDIGO ═══════ -->

  <rect x="582" y="12" width="286" height="246" rx="26" fill="none" stroke="#6366f1" stroke-width="10" opacity="0.05">
    <animate attributeName="opacity"
      values="0.02;0.12;0.02" dur="2.6s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <rect x="590" y="20" width="270" height="230" rx="20" fill="#0f1219" stroke="#6366f1" stroke-width="1.4">
    <animate attributeName="stroke-opacity"
      values="0.3;1;0.3" dur="2.6s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>
  <rect x="590" y="20" width="270" height="4" rx="20" fill="#6366f1">
    <animate attributeName="opacity"
      values="0.45;1;0.45" dur="2.6s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite"/>
  </rect>

  <text x="725" y="43" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#6366f1" letter-spacing="2.5" opacity="0.8">ACHIEVEMENT UNLOCKED</text>
  <line x1="606" y1="51" x2="844" y2="51" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>

  <g>
    <text x="725" y="118" text-anchor="middle" font-size="48" font-family="serif">⚡</text>
    <!-- gentle float -->
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-6;0,0" dur="3.6s"
      calcMode="spline" keyTimes="0;0.5;1"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      repeatCount="indefinite" additive="sum"/>
    <!-- periodic wiggle every 5s, offset 3s -->
    <animateTransform attributeName="transform" type="rotate"
      values="0 725 92;-18 725 92;18 725 92;-10 725 92;10 725 92;-4 725 92;4 725 92;0 725 92"
      keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1"
      dur="0.7s"
      begin="6s;11s;16s;21s;26s;31s"
      additive="sum"/>
  </g>

  <rect x="681" y="130" width="88" height="20" rx="10" fill="#6366f1" opacity="0.12"/>
  <rect x="681" y="130" width="88" height="20" rx="10" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
  <text x="725" y="144" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6366f1" font-weight="bold" letter-spacing="2.5">WINNER</text>

  <text x="725" y="168" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">WordPress</text>
  <text x="725" y="183" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#ffffff" opacity="0.88">Creathon</text>

  <rect x="615" y="207" width="220" height="5" rx="2.5" fill="#ffffff" opacity="0.06"/>
  <rect x="615" y="207" width="0" height="5" rx="2.5" fill="#6366f1" opacity="0.85">
    <animate attributeName="width" from="0" to="220" dur="1.6s"
      calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"
      fill="freeze" begin="1s"/>
  </rect>
  <text x="725" y="232" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#6366f1" opacity="0.6">◆  +600 XP  ◆</text>

</svg>
