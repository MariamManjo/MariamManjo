  <text x="137" y="40" text-anchor="middle" font-family="'Courier New',monospace" font-size="7.5" fill="#ff6b9d" letter-spacing="2.5" opacity="0.85">ACHIEVEMENT UNLOCKED</text>

  <!-- Divider -->
