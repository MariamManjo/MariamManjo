  <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="2.8s" repeatCount="indefinite" additive="sum"/>

  <!-- WINNER pill -->
  <rect x="93" y="122" width="88" height="19" rx="4" fill="#ff6b9d" opacity="0.12"/>
